<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenli Ödeme - Akıllı Lojistik</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(22, 28, 45, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --primary-color: #8b5cf6;
            --primary-hover: #7c3aed;
            --accent-color: #10b981;
            --danger-color: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-blur: 16px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 90%, rgba(139, 92, 246, 0.15), transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 0;
        }

        .form-container {
            width: 100%;
            max-width: 600px;
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .form-header {
            background: linear-gradient(90deg, rgba(139, 92, 246, 0.2), rgba(139, 92, 246, 0.05));
            padding: 2rem;
            border-bottom: 1px solid var(--surface-border);
            text-align: center;
        }

        .form-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            color: #ede9fe;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .form-body {
            padding: 2.5rem;
        }

        /* Flash Error Message */
        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: shake 0.5s ease-in-out;
        }

        /* Order Summary Display */
        .price-display {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .price-display p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }
        
        .order-id-badge {
            background: rgba(255,255,255,0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-family: 'Outfit', monospace;
            color: #e2e8f0;
        }

        .total-amount {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .form-select, .form-control {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-select option {
            background: #0f172a;
            color: white;
            padding: 10px;
        }

        .form-select:focus, .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        /* Dynamic Fields Animation */
        .payment-details {
            display: none;
            animation: fadeIn 0.4s ease-out;
            background: rgba(255, 255, 255, 0.02);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px dashed rgba(255,255,255,0.1);
            margin-top: 1.5rem;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
    
    <script>
        function toggleFields() {
            const method = document.getElementById("strategySelector").value;
            document.querySelectorAll(".payment-details").forEach(el => el.style.display = 'none');
            
            if(method === 'creditCardStrategy') {
                document.getElementById("cc-fields").style.display = 'block';
            } else if(method === 'bankTransferStrategy') {
                document.getElementById("bank-fields").style.display = 'block';
            } else if(method === 'cryptoStrategy') {
                document.getElementById("crypto-fields").style.display = 'block';
            }
        }
    </script>
</head>
<body onload="toggleFields()">

    <div class="form-container">
        <div class="form-header">
            <h2>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                    <line x1="1" y1="10" x2="23" y2="10"></line>
                </svg>
                Güvenli Ödeme İşlemi
            </h2>
        </div>
        
        <div class="form-body">
            
            <div th:if="${errorMessage}" class="alert-error">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="price-display">
                <p>Sipariş ID: <span class="order-id-badge" th:text="${order.id}"></span></p>
                <h3 class="total-amount" th:text="${order.getGrandTotal() + ' TL'}">0 TL</h3>
            </div>

            <form th:action="@{/payment/process}" method="post">
                <input type="hidden" name="orderId" th:value="${order.id}">
                
                <div class="form-group">
                    <label class="form-label">Ödeme Yöntemi (Strategy Pattern Seçimi)</label>
                    <select name="strategyBean" id="strategySelector" class="form-select" onchange="toggleFields()">
                        <option value="creditCardStrategy">💳 Kredi Kartı</option>
                        <option value="bankTransferStrategy">🏦 Banka Havalesi / EFT</option>
                        <option value="cryptoStrategy">⛓️ Kripto Para (Bitcoin/ETH vb.)</option>
                    </select>
                </div>

                <!-- Credit Card Strategy Fields -->
                <div id="cc-fields" class="payment-details">
                    <input type="text" name="details[cardNumber]" class="form-control" placeholder="💳 Kart Numarası (Örn: 4532...)" autocomplete="off">
                    <div class="row">
                        <input type="text" name="details[expiry]" class="form-control" placeholder="📅 Son Kullanma (AA/YY)">
                        <input type="password" name="details[cvv]" class="form-control" placeholder="🔒 CVV Kodu">
                    </div>
                </div>

                <!-- Bank Transfer Strategy Fields -->
                <div id="bank-fields" class="payment-details">
                    <input type="text" name="details[iban]" class="form-control" placeholder="🏦 Gönderici IBAN Numarası">
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.75rem; margin-bottom: 0;">* Havale açıklamasına sipariş ID'nizi yazmayı unutmayınız.</p>
                </div>

                <!-- Crypto Strategy Fields -->
                <div id="crypto-fields" class="payment-details">
                    <input type="text" name="details[walletAddress]" class="form-control" placeholder="⛓️ Gönderici Cüzdan Adresi (Hash)">
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.75rem; margin-bottom: 0;">* Sadece desteklenen ağlardan (ERC-20, TRC-20) gönderim yapınız.</p>
                </div>

                <button type="submit" class="btn-submit">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Ödemeyi Onayla ve Tamamla
                </button>
            </form>
        </div>
    </div>

</body>
</html>
