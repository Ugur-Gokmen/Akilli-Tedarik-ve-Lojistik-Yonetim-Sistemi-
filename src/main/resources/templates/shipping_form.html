<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kargo ve Lojistik - Akıllı Lojistik</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(22, 28, 45, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --info-color: #0ea5e9;
            --info-hover: #0284c7;
            --accent-color: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-blur: 16px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 100% 0%, rgba(14, 165, 233, 0.15), transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 0;
        }

        .form-container {
            width: 100%;
            max-width: 750px;
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .form-header {
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.2), rgba(14, 165, 233, 0.05));
            padding: 2rem;
            border-bottom: 1px solid var(--surface-border);
        }

        .form-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #e0f2fe;
        }

        .form-body {
            padding: 2.5rem;
        }

        /* Order Summary Alert */
        .order-summary {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .order-summary-item {
            display: flex;
            flex-direction: column;
        }
        
        .summary-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .summary-value {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-control, .form-select {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-select option {
            background: #0f172a;
            color: white;
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: var(--info-color);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
        }

        .section-title {
            color: var(--info-color);
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-top: 2rem;
        }

        /* Modern Switches */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 1rem;
            transition: background 0.3s;
        }

        .switch-container:hover {
            background: rgba(15, 23, 42, 0.7);
        }

        .switch-label {
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--info-color);
        }

        input:focus + .slider {
            box-shadow: 0 0 1px var(--info-color);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--info-color), var(--info-hover));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.5);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="3" width="15" height="13"></rect>
                    <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                    <circle cx="5.5" cy="18.5" r="2.5"></circle>
                    <circle cx="18.5" cy="18.5" r="2.5"></circle>
                </svg>
                Sipariş Kargolama Formu
            </h2>
        </div>
        
        <div class="form-body">
            <div class="order-summary">
                <div class="order-summary-item">
                    <span class="summary-label">Sipariş ID</span>
                    <span class="summary-value" th:text="${order.id}">ORD-123</span>
                </div>
                <div class="order-summary-item" style="text-align: right;">
                    <span class="summary-label">Toplam Ağırlık</span>
                    <span class="summary-value" th:text="${order.getTotalWeightKg()} + ' kg'">0 kg</span>
                </div>
            </div>

            <form th:action="@{'/cargo/ship/' + ${order.id}}" method="post">
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" style="color: var(--info-color); font-weight: 600;">Kargo Firması (Factory Pattern)</label>
                        <select name="company" class="form-select" required>
                            <option th:each="comp : ${companies}" 
                                    th:value="${comp}" 
                                    th:text="${comp}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Çıkış Şehri</label>
                        <input type="text" name="senderCity" class="form-control" value="Sakarya" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Varış Şehri</label>
                        <input type="text" name="receiverCity" class="form-control" required>
                    </div>
                </div>

                <div class="form-group" style="max-width: 250px;">
                    <label class="form-label">Tahmini Mesafe (KM)</label>
                    <input type="number" name="distanceKm" class="form-control" placeholder="Örn: 150" required>
                </div>

                <div class="section-title">Ekstra Hizmetler (Decorator Pattern)</div>
                
                <div class="switch-container">
                    <label class="switch-label" for="insurance">Sigortalı Gönderim Koruması</label>
                    <label class="switch">
                        <input type="checkbox" name="withInsurance" id="insurance">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="switch-container">
                    <label class="switch-label" for="fragile">Kırılacak Eşya Koruması (Hassas Taşıma)</label>
                    <label class="switch">
                        <input type="checkbox" name="withFragile" id="fragile">
                        <span class="slider"></span>
                    </label>
                </div>

                <button type="submit" class="btn-submit">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    Siparişi Kargoya Ver
                </button>
            </form>
        </div>
    </div>

</body>
</html>
