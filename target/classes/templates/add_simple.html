<!DOCTYPE html>
<html class="dark" lang="tr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin_layout :: adminHead('Yeni Ürün Ekle')}"></head>
<body class="bg-background text-on-background font-body-lg antialiased min-h-screen flex">

<!-- SideNavBar -->
<div th:replace="~{fragments/admin_layout :: adminSidebar('inventory')}"></div>

<!-- Main Content -->
<main class="flex-1 md:ml-[280px] flex flex-col min-h-screen">
<header class="fixed top-0 right-0 left-0 md:left-[280px] h-16 bg-slate-900/50 backdrop-blur-md flex items-center justify-between px-6 z-30 border-b border-white/10">
    <div class="flex items-center gap-4">
        <h2 class="text-on-surface font-bold">Yeni Basit Ürün</h2>
    </div>
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold" th:if="${currentUser != null}" th:text="${#strings.substring(currentUser.username,0,1).toUpperCase()}">U</div>
    </div>
</header>

<div class="flex-1 mt-16 p-lg pt-12 flex justify-center">
    <div class="w-full max-w-2xl">
        <div class="mb-8">
            <a th:href="@{/inventory/list}" class="flex items-center gap-1 text-slate-400 hover:text-white text-sm mb-4 transition-colors w-fit">
                <span class="material-symbols-outlined text-[18px]">arrow_back</span>Envantere Dön
            </a>
            <h1 class="font-h1 text-h1 text-on-surface">Yeni Basit Ürün Ekle</h1>
            <p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Sisteme yeni bir tekil varlık tanımlayın.</p>
        </div>

        <div class="bg-surface-container border border-white/10 rounded-xl p-8 shadow-xl">
            <form th:action="@{/inventory/add-simple}" method="post" class="space-y-6">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div>
                    <label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">Ürün Adı</label>
                    <input type="text" name="name" required class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-on-surface-variant/30"/>
                </div>

                <div>
                    <label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">SKU (Stok Kodu)</label>
                    <input type="text" name="sku" placeholder="Örn: SKU-100" required class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-mono"/>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">Birim Fiyat (TL)</label>
                        <input type="number" step="0.01" name="price" required class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-mono"/>
                    </div>
                    <div>
                        <label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">Ağırlık (KG)</label>
                        <input type="number" step="0.01" name="weight" required class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-mono"/>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">Başlangıç Stoğu</label>
                        <input type="number" name="stock" value="0" required class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-mono"/>
                    </div>
                    <div>
                        <label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">Kritik Stok Eşiği</label>
                        <input type="number" name="threshold" value="10" required class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-mono"/>
                    </div>
                </div>

                <button type="submit" class="w-full bg-primary text-on-primary py-4 rounded-lg font-bold text-sm uppercase tracking-widest hover:bg-primary-fixed transition-colors shadow-lg shadow-primary/20 mt-4">
                    Basit Ürünü Kaydet
                </button>
            </form>
        </div>
    </div>
</div>
</main>
</body>
</html>
