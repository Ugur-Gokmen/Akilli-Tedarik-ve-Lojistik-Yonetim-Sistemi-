<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="appHead(pageTitle)">
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' - LogiControl'">LogiControl</title>
    <meta http-equiv="Cache-Control" content="public, max-age=86400"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,FILL@0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-tint":"#adc7ff","secondary-container":"#414a52","surface-container-highest":"#31353d",
                        "on-tertiary-container":"#4c1a00","primary-fixed-dim":"#adc7ff","on-primary-container":"#00285b",
                        "inverse-primary":"#005bc0","secondary":"#bfc8d0","on-secondary-fixed":"#141d23",
                        "background":"#10131b","on-surface":"#e0e2ed","primary":"#adc7ff","on-secondary-container":"#b0b9c2",
                        "surface-container":"#1c2027","on-error":"#690005","on-error-container":"#ffdad6",
                        "surface-bright":"#363942","surface-variant":"#31353d","surface-container-lowest":"#0b0e16",
                        "on-primary":"#002e68","primary-fixed":"#d8e2ff","on-primary-fixed":"#001a41",
                        "surface-container-high":"#272a32","on-secondary":"#293138","surface-dim":"#10131b",
                        "error":"#ffb4ab","tertiary":"#ffb695","error-container":"#93000a","outline-variant":"#414754",
                        "outline":"#8b90a0","inverse-surface":"#e0e2ed","on-surface-variant":"#c1c6d7",
                        "surface-container-low":"#181c23","on-background":"#e0e2ed","surface":"#10131b",
                        "primary-container":"#4a8eff","on-secondary-fixed-variant":"#3f484f",
                        "inverse-on-surface":"#2d3039","success":"#4ade80","success-container":"#14532d",
                        "on-success-container":"#bbf7d0","warning":"#fcd34d"
                    },
                    spacing: {
                        "xs": "4px",
                        "sm": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "xl": "40px",
                        "gutter": "20px",
                        "sidebar_width": "280px"
                    },
                    fontFamily: {
                        "body-lg":["Inter"],"label-caps":["Inter"],"body-sm":["Inter"],"display":["Inter"],"h2":["Inter"],"h1":["Inter"],"mono":["monospace"]
                    },
                    fontSize: {
                        "body-lg":["16px",{"lineHeight":"1.6","fontWeight":"400"}],
                        "label-caps":["12px",{"lineHeight":"1.0","letterSpacing":"0.05em","fontWeight":"700"}],
                        "body-sm":["14px",{"lineHeight":"1.5","fontWeight":"400"}],
                        "display":["36px",{"lineHeight":"1.2","letterSpacing":"-0.02em","fontWeight":"700"}],
                        "h2":["20px",{"lineHeight":"1.3","fontWeight":"600"}],
                        "h1":["24px",{"lineHeight":"1.3","fontWeight":"600"}],
                        "mono":["13px",{"lineHeight":"1.0","fontWeight":"500"}]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-family: "Material Symbols Outlined";
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            font-variation-settings: "FILL" 0, "wght" 400;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: "FILL" 1, "wght" 400;
        }
        .ghost-border { border: 1px solid rgba(255,255,255,0.1); }
        @keyframes subtlePulse {
            0%   { box-shadow: 0 0 0 0 rgba(74,142,255,0.4); }
            70%  { box-shadow: 0 0 0 6px rgba(74,142,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(74,142,255,0); }
        }
        .active-pulse { animation: subtlePulse 2s infinite; }
    </style>
</head>
</html>
