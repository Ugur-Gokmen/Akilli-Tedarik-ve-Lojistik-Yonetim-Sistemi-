<!DOCTYPE html>
<html class="dark" lang="tr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/customer_layout :: customerHead('Sipariş Özeti')}"></head>
<body class="bg-slate-950 text-slate-100 font-['Inter'] min-h-screen">
<aside th:replace="~{fragments/customer_layout :: customerSidebar('orders', ${cartCount})}"></aside>

<main class="md:ml-[280px] min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-2">Ödeme Öncesi Sipariş Özeti</h1>
        <p class="text-slate-400 mb-8">Sipariş numaranız: <span class="font-mono text-slate-200" th:text="${order.id}">ID</span></p>

        <div class="bg-slate-900 rounded-xl border border-white/10 overflow-hidden">
            <table class="w-full">
                <thead class="bg-slate-800/70 text-slate-400 text-sm">
                <tr>
                    <th class="text-left p-4">Ürün</th>
                    <th class="text-right p-4">Adet</th>
                    <th class="text-right p-4">Birim Fiyat</th>
                    <th class="text-right p-4">Toplam</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${order.items}" class="border-t border-white/5">
                    <td class="p-4" th:text="${item.product.name}">Ürün</td>
                    <td class="p-4 text-right" th:text="${item.quantity}">1</td>
                    <td class="p-4 text-right" th:text="${#numbers.formatDecimal(item.unitPriceAtOrderTime,1,2)} + ' TL'">0 TL</td>
                    <td class="p-4 text-right font-semibold" th:text="${#numbers.formatDecimal(item.totalPrice,1,2)} + ' TL'">0 TL</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-6 bg-slate-900 rounded-xl border border-white/10 p-6">
            <div class="flex justify-between text-slate-400">
                <span>Ara Toplam</span>
                <span th:text="${#numbers.formatDecimal(order.totalAmount,1,2)} + ' TL'">0 TL</span>
            </div>
            <div class="flex justify-between text-xl font-bold mt-3">
                <span>Genel Toplam</span>
                <span class="text-blue-200" th:text="${#numbers.formatDecimal(order.grandTotal,1,2)} + ' TL'">0 TL</span>
            </div>
        </div>

        <div class="mt-8 flex justify-between gap-3">
            <a th:href="@{/orders/my-orders}" class="px-6 py-3 rounded-lg border border-white/15 text-slate-200 hover:bg-slate-800">Siparişlerime Dön</a>
            <a th:href="@{/payment/{id}(id=${order.id})}" class="px-6 py-3 rounded-lg bg-blue-500 text-slate-950 font-semibold hover:bg-blue-400">Ödemeye Geç</a>
        </div>
    </div>
</main>
</body>
</html>
