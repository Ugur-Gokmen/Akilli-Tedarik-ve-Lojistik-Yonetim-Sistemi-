<!DOCTYPE html>
<html class="dark" lang="tr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin_layout :: adminHead('Bileşik Ürün Ekle')}"></head>
<body class="bg-background text-on-background font-body-lg antialiased min-h-screen flex">

<!-- SideNavBar -->
<div th:replace="~{fragments/admin_layout :: adminSidebar('inventory')}"></div>

<!-- Main Content -->
<main class="flex-1 md:ml-[280px] flex flex-col min-h-screen">
<header class="fixed top-0 right-0 left-0 md:left-[280px] h-16 bg-slate-900/50 backdrop-blur-md flex items-center justify-between px-6 z-30 border-b border-white/10">
    <div class="flex items-center gap-4">
        <h2 class="text-on-surface font-bold">Yeni Bileşik Ürün</h2>
    </div>
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold" th:if="${currentUser != null}" th:text="${#strings.substring(currentUser.username,0,1).toUpperCase()}">U</div>
    </div>
</header>

<div class="flex-1 mt-16 p-lg pt-12 flex justify-center">
    <div class="w-full max-w-3xl">
        <div class="mb-8">
            <a th:href="@{/inventory/list}" class="flex items-center gap-1 text-slate-400 hover:text-white text-sm mb-4 transition-colors w-fit">
                <span class="material-symbols-outlined text-[18px]">arrow_back</span>Envantere Dön
            </a>
            <h1 class="font-h1 text-h1 text-on-surface">Bileşik Ürün (Montaj) Tanımla</h1>
            <p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Alt bileşenlerden oluşan karmaşık bir ürün oluşturun (Composite Pattern).</p>
        </div>

        <div class="bg-surface-container border border-white/10 rounded-xl p-8 shadow-xl">
            <form th:action="@{/inventory/add-composite}" method="post" class="space-y-8">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">Ürün Adı (Örn: Gaming PC)</label>
                        <input type="text" name="name" required class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-all placeholder:text-on-surface-variant/30"/>
                    </div>
                    <div>
                        <label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">Montaj Ücreti (TL)</label>
                        <input type="number" step="0.01" name="assemblyFee" value="0" required class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-all font-mono"/>
                    </div>
                </div>

                <div>
                    <label class="block font-label-caps text-label-caps text-on-surface-variant mb-3 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary text-[18px]">account_tree</span>
                        Bileşen Seçimi (Composite Yapısı)
                    </label>
                    <div class="bg-surface-container-lowest border border-outline-variant rounded-lg overflow-hidden">
                        <div class="max-h-60 overflow-y-auto custom-scrollbar p-2 space-y-1">
                            <label th:each="ap : ${availableProducts}" th:for="'comp-' + ${ap.id}" class="flex items-center gap-4 p-3 rounded-lg hover:bg-surface-container-high cursor-pointer transition-colors group">
                                <input type="checkbox" name="selectedComponentIds" th:value="${ap.id}" th:id="'comp-' + ${ap.id}" class="w-5 h-5 rounded border-outline-variant bg-surface-container text-primary focus:ring-primary focus:ring-offset-surface-container"/>
                                <div class="flex-1">
                                    <p class="font-medium text-sm text-on-surface" th:text="${ap.name}">Bileşen Adı</p>
                                    <p class="text-[10px] text-on-surface-variant font-mono" th:text="${ap.id}">ID</p>
                                </div>
                                <div class="text-right">
                                    <p class="font-mono text-xs text-primary" th:text="${#numbers.formatDecimal(ap.unitPrice,1,2)} + ' TL'">0.00 TL</p>
                                    <p class="text-[10px] text-on-surface-variant" th:text="'Stok: ' + ${ap.stock}">Stok: 0</p>
                                </div>
                            </label>
                            <div th:if="${availableProducts == null or availableProducts.empty}" class="p-6 text-center text-on-surface-variant text-sm">
                                <span class="material-symbols-outlined text-4xl mb-2 opacity-20">inventory</span>
                                <p>Alt bileşen olarak seçilebilecek ürün bulunamadı.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">Başlangıç Stoğu</label>
                        <input type="number" name="stock" value="0" required class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-all font-mono"/>
                    </div>
                    <div>
                        <label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">Kritik Stok Eşiği</label>
                        <input type="number" name="threshold" value="10" required class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-all font-mono"/>
                    </div>
                </div>

                <button type="submit" class="w-full bg-tertiary text-on-error py-4 rounded-lg font-bold text-sm uppercase tracking-widest hover:opacity-90 transition-all shadow-lg shadow-tertiary/10 mt-4">
                    Bileşik Ürünü Kaydet
                </button>
            </form>
        </div>
    </div>
</div>
</main>
</body>
</html>
